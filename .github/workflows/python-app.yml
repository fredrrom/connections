name: tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --locked --dev --group docs

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type check with ty
        run: uv run ty check

      - name: Test with pytest
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Build docs
        run: uv run --group docs mkdocs build --strict -f docs/mkdocs.yml
